<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 苹果互动 - 手部追踪</title>
    <meta name="description" content="用手机摄像头检测手部，苹果会飞过来舔你的手！">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;touch-action:none}
        #video-container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
        #input-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        #canvas3d{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;pointer-events:none}
        #debug-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;pointer-events:none}
        #loading-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:100;
            background:linear-gradient(135deg,#1a0a0a,#2d0f0f 50%,#1a0505);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            transition:opacity 0.6s ease}
        #loading-overlay.hidden{opacity:0;pointer-events:none}
        .loading-apple{font-size:80px;animation:bounce 1.5s ease-in-out infinite}
        @keyframes bounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-20px) rotate(-5deg)}75%{transform:translateY(-10px) rotate(5deg)}}
        .loading-text{color:#ff6b6b;font-size:18px;margin-top:24px;letter-spacing:2px;animation:pulse 2s ease-in-out infinite}
        .loading-sub{color:rgba(255,107,107,0.5);font-size:13px;margin-top:8px}
        @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
        .loading-bar{width:200px;height:4px;background:rgba(255,107,107,0.2);border-radius:2px;margin-top:16px;overflow:hidden}
        .loading-bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#ff6b6b,#ff8e8e);border-radius:2px;transition:width 0.3s ease}
        #status-hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;
            padding:8px 20px;border-radius:24px;font-size:14px;color:#fff;
            backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);
            transition:all 0.3s ease;white-space:nowrap}
        #status-hud.detecting{background:rgba(76,175,80,0.6);border-color:rgba(76,175,80,0.3)}
        #status-hud .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;
            vertical-align:middle;background:#aaa;animation:blink 1.5s ease-in-out infinite}
        #status-hud.detecting .dot{background:#4caf50}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        #instruction{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;
            padding:12px 24px;border-radius:16px;font-size:15px;color:rgba(255,255,255,0.9);
            backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);
            text-align:center;transition:opacity 1s ease;max-width:90vw}
        #instruction.hidden{opacity:0;pointer-events:none}
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loading-apple">🍎</div>
    <div class="loading-text">正在加载 AR 体验...</div>
    <div class="loading-sub" id="loading-detail">初始化...</div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
</div>

<div id="status-hud">
    <span class="dot"></span>
    <span id="status-text">初始化中...</span>
</div>

<div id="instruction">伸出你的手 🖐️ 苹果会飞过来舔你！</div>

<div id="video-container">
    <video id="input-video" autoplay playsinline muted></video>
</div>

<canvas id="canvas3d"></canvas>
<canvas id="debug-canvas"></canvas>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
    CHASE_SPEED: 2.5,
    LICK_DISTANCE: 0.35,
    FLOAT_AMPLITUDE: 0.08,
    FLOAT_SPEED: 2.0,
    WOBBLE_AMPLITUDE: 5,
    WOBBLE_SPEED: 1.5,
    LICK_SPEED: 8.0,
    RUN_WOBBLE_SPEED: 12,
    RUN_WOBBLE_AMPLITUDE: 12,
    SMOOTH_FACTOR: 0.08,
    APPLE_SCALE: 1.5,
    CAMERA_Z: 2.5,
};

// ============================================================
// GLOBALS
// ============================================================
let THREE, scene, camera, renderer, clock;
let appleGroup, appleMesh;
let tongueVertexIndices = [];   // buffer indices of tongue vertices
let tongueOrigPositions = [];   // original Float32 positions to restore
let tongueBaseZ = 0;            // average Z of tongue for animation reference
let handDetected = false;
let handPosition = { x: 0, y: 0 };
let smoothedHandPosition = { x: 0, y: 0 };
let appleState = 'idle';
let appleWorldPos = { x: 0, y: 0 };
let debugCtx;
let scaleFactor = 1;

function updateLoadProgress(pct, detail) {
    document.getElementById('loading-bar-fill').style.width = Math.min(pct, 100) + '%';
    if (detail) document.getElementById('loading-detail').textContent = detail;
}

function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden');
}

function setStatus(text, detecting = false) {
    const hud = document.getElementById('status-hud');
    document.getElementById('status-text').textContent = text;
    if (detecting) hud.classList.add('detecting');
    else hud.classList.remove('detecting');
}

// ============================================================
// DYNAMIC SCRIPT LOADER
// ============================================================
function loadScript(url) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

// ============================================================
// THREE.JS SETUP
// ============================================================
function initThree() {
    const canvas = document.getElementById('canvas3d');
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, CONFIG.CAMERA_Z);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false }); // antialias off for speed
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // cap pixel ratio
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(2, 3, 4);
    scene.add(dirLight);

    clock = new THREE.Clock();

    const debugCanvas = document.getElementById('debug-canvas');
    debugCanvas.width = window.innerWidth;
    debugCanvas.height = window.innerHeight;
    debugCtx = debugCanvas.getContext('2d');

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        const dc = document.getElementById('debug-canvas');
        dc.width = window.innerWidth;
        dc.height = window.innerHeight;
    });
}

// ============================================================
// LOAD APPLE FROM BINARY (with tongue vertex data)
// ============================================================
async function loadAppleBinary() {
    updateLoadProgress(30, '加载苹果模型...');
    
    const [buffer, texture] = await Promise.all([
        fetch('model/apple.bin?v=2').then(r => r.arrayBuffer()),
        new Promise((resolve) => {
            const tex = new THREE.TextureLoader().load('model/texture_diffuse.jpg?v=2', () => resolve(tex));
            tex.colorSpace = THREE.SRGBColorSpace;
        })
    ]);
    
    updateLoadProgress(60, '构建3D模型...');
    
    const view = new DataView(buffer);
    let offset = 0;
    
    // Read header: vertCount, idxCount, tongueVertCount
    const vertCount = view.getUint32(offset, true); offset += 4;
    const idxCount = view.getUint32(offset, true); offset += 4;
    const tongueVertCount = view.getUint32(offset, true); offset += 4;
    
    // Read positions (make a copy so we can modify for animation)
    const positionsSrc = new Float32Array(buffer, offset, vertCount * 3);
    const positions = new Float32Array(positionsSrc); // writable copy
    offset += vertCount * 3 * 4;
    
    // Read UVs
    const uvs = new Float32Array(buffer, offset, vertCount * 2);
    offset += vertCount * 2 * 4;
    
    // Read normals
    const normals = new Float32Array(buffer, offset, vertCount * 3);
    offset += vertCount * 3 * 4;
    
    // Read mesh indices
    const indices = new Uint16Array(buffer, offset, idxCount);
    offset += idxCount * 2;
    
    // Read tongue vertex indices
    const tongueIndicesRaw = new Uint16Array(buffer, offset, tongueVertCount);
    tongueVertexIndices = Array.from(tongueIndicesRaw);
    
    // Build geometry
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
    geometry.setIndex(new THREE.BufferAttribute(indices, 1));
    
    // Center and scale
    geometry.computeBoundingBox();
    const box = geometry.boundingBox;
    const center = new THREE.Vector3();
    box.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);
    
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    scaleFactor = CONFIG.APPLE_SCALE / maxDim;
    geometry.scale(scaleFactor, scaleFactor, scaleFactor);
    
    // Store original tongue vertex positions (after centering + scaling)
    const posAttr = geometry.attributes.position;
    tongueOrigPositions = [];
    let sumZ = 0;
    for (const vi of tongueVertexIndices) {
        const x = posAttr.getX(vi);
        const y = posAttr.getY(vi);
        const z = posAttr.getZ(vi);
        tongueOrigPositions.push({ x, y, z });
        sumZ += z;
    }
    tongueBaseZ = sumZ / tongueVertexIndices.length;
    
    // Create mesh
    const material = new THREE.MeshLambertMaterial({ map: texture });
    appleMesh = new THREE.Mesh(geometry, material);
    
    appleGroup = new THREE.Group();
    appleGroup.add(appleMesh);
    
    appleGroup.position.set(0, 0, 0);
    scene.add(appleGroup);
    appleWorldPos = { x: 0, y: 0 };
    
    updateLoadProgress(70, '苹果模型加载完成!');
}

// ============================================================
// MEDIAPIPE HANDS
// ============================================================
async function initMediaPipe() {
    updateLoadProgress(75, '加载手部追踪 AI...');
    
    const videoEl = document.getElementById('input-video');

    const hands = new Hands({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5,
    });

    hands.onResults(onHandResults);

    updateLoadProgress(85, '启动摄像头...');
    
    const cam = new Camera(videoEl, {
        onFrame: async () => {
            await hands.send({ image: videoEl });
        },
        width: 640,
        height: 480,
        facingMode: 'environment',
    });

    await cam.start();
    updateLoadProgress(100, '准备就绪!');
    
    setTimeout(() => {
        hideLoading();
        setStatus('请伸出你的手 🖐️');
    }, 300);
}

function onHandResults(results) {
    debugCtx.clearRect(0, 0, debugCtx.canvas.width, debugCtx.canvas.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        handDetected = true;
        drawHandLandmarks(landmarks);

        const palmIndices = [0, 5, 9, 13, 17];
        let palmX = 0, palmY = 0;
        palmIndices.forEach(i => { palmX += landmarks[i].x; palmY += landmarks[i].y; });
        palmX /= palmIndices.length;
        palmY /= palmIndices.length;

        const aspect = window.innerWidth / window.innerHeight;
        const vFov = (camera.fov * Math.PI) / 180;
        const planeHeight = 2 * Math.tan(vFov / 2) * CONFIG.CAMERA_Z;
        const planeWidth = planeHeight * aspect;

        handPosition.x = (palmX - 0.5) * planeWidth;
        handPosition.y = -(palmY - 0.5) * planeHeight;

        setStatus('检测到手！🖐️', true);
    } else {
        handDetected = false;
        setStatus('请伸出你的手 🖐️');
    }
}

function drawHandLandmarks(landmarks) {
    const w = debugCtx.canvas.width, h = debugCtx.canvas.height;
    const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

    debugCtx.strokeStyle = 'rgba(76,175,80,0.6)';
    debugCtx.lineWidth = 2;
    conn.forEach(([a,b]) => {
        debugCtx.beginPath();
        debugCtx.moveTo(landmarks[a].x*w, landmarks[a].y*h);
        debugCtx.lineTo(landmarks[b].x*w, landmarks[b].y*h);
        debugCtx.stroke();
    });

    landmarks.forEach((lm, i) => {
        debugCtx.beginPath();
        debugCtx.arc(lm.x*w, lm.y*h, i===0?5:3, 0, Math.PI*2);
        debugCtx.fillStyle = i<5 ? 'rgba(255,107,107,0.8)' : 'rgba(76,175,80,0.8)';
        debugCtx.fill();
    });
}

// ============================================================
// ANIMATION
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    if (!appleGroup) { renderer.render(scene, camera); return; }

    if (handDetected) {
        smoothedHandPosition.x += (handPosition.x - smoothedHandPosition.x) * CONFIG.SMOOTH_FACTOR;
        smoothedHandPosition.y += (handPosition.y - smoothedHandPosition.y) * CONFIG.SMOOTH_FACTOR;
    }

    if (handDetected) {
        const dx = smoothedHandPosition.x - appleWorldPos.x;
        const dy = smoothedHandPosition.y - appleWorldPos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        appleState = dist < CONFIG.LICK_DISTANCE ? 'licking' : 'chasing';
    } else {
        appleState = 'idle';
    }

    const deg = Math.PI / 180;
    switch (appleState) {
        case 'idle': {
            const floatY = Math.sin(elapsed * CONFIG.FLOAT_SPEED) * CONFIG.FLOAT_AMPLITUDE;
            appleGroup.position.set(appleWorldPos.x, appleWorldPos.y + floatY, 0);
            const wz = Math.sin(elapsed * CONFIG.WOBBLE_SPEED) * CONFIG.WOBBLE_AMPLITUDE * deg;
            const wx = Math.cos(elapsed * CONFIG.WOBBLE_SPEED * 0.7) * CONFIG.WOBBLE_AMPLITUDE * 0.5 * deg;
            appleGroup.rotation.set(wx, 0, wz);
            break;
        }
        case 'chasing': {
            const dx = smoothedHandPosition.x - appleWorldPos.x;
            const dy = smoothedHandPosition.y - appleWorldPos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0.01) {
                const speed = CONFIG.CHASE_SPEED * dt;
                appleWorldPos.x += (dx/dist) * Math.min(speed, dist);
                appleWorldPos.y += (dy/dist) * Math.min(speed, dist);
            }
            const floatY = Math.sin(elapsed * CONFIG.FLOAT_SPEED * 1.5) * CONFIG.FLOAT_AMPLITUDE * 0.5;
            appleGroup.position.set(appleWorldPos.x, appleWorldPos.y + floatY, 0);
            
            // Turn body toward hand while chasing (tongue faces hand direction)
            const faceY = Math.atan2(dx, 0.8);  // rotate left/right toward hand
            const faceX = Math.atan2(-dy, 0.8);  // tilt up/down toward hand
            const wz = Math.sin(elapsed * CONFIG.RUN_WOBBLE_SPEED) * CONFIG.RUN_WOBBLE_AMPLITUDE * deg;
            appleGroup.rotation.set(faceX * 0.4, faceY * 0.4, wz);
            break;
        }
        case 'licking': {
            const dx = smoothedHandPosition.x - appleWorldPos.x;
            const dy = smoothedHandPosition.y - appleWorldPos.y;
            appleWorldPos.x += dx * 0.05;
            appleWorldPos.y += dy * 0.05;
            const floatY = Math.sin(elapsed * CONFIG.FLOAT_SPEED * 0.8) * CONFIG.FLOAT_AMPLITUDE * 0.3;
            appleGroup.position.set(appleWorldPos.x, appleWorldPos.y + floatY, 0);
            
            // Rotate body to face the hand — tongue points at hand
            const faceY = Math.atan2(dx, 0.4);  // aggressively turn toward hand
            const faceX = Math.atan2(-dy, 0.4);  // aggressively tilt toward hand
            const wiggle = Math.sin(elapsed * 6) * 5 * deg; // happy wiggle
            appleGroup.rotation.set(faceX, faceY, wiggle);
            break;
        }
    }

    // Animate model's own tongue vertices
    animateTongue(elapsed);

    if (handDetected) document.getElementById('instruction').classList.add('hidden');

    renderer.render(scene, camera);
}

function animateTongue(elapsed) {
    if (!appleMesh || tongueVertexIndices.length === 0) return;
    
    const posAttr = appleMesh.geometry.attributes.position;
    
    if (appleState === 'licking') {
        // Licking animation: extend tongue forward (Z) and waggle (X)
        const lickPhase = Math.sin(elapsed * CONFIG.LICK_SPEED);
        const extend = Math.max(0, lickPhase) * 0.18 * scaleFactor; // forward extension
        const waggle = Math.sin(elapsed * CONFIG.LICK_SPEED * 1.7) * 0.06 * scaleFactor; // left-right waggle
        
        for (let i = 0; i < tongueVertexIndices.length; i++) {
            const vi = tongueVertexIndices[i];
            const orig = tongueOrigPositions[i];
            // How far this vertex is from tongue base (tip moves more)
            const distFromBase = (orig.z - tongueBaseZ) / (0.2 * scaleFactor);
            const weight = Math.max(0, Math.min(1, distFromBase * 1.5 + 0.3));
            
            posAttr.setX(vi, orig.x + waggle * weight);
            posAttr.setZ(vi, orig.z + extend * weight);
        }
    } else {
        // Restore original positions
        for (let i = 0; i < tongueVertexIndices.length; i++) {
            const vi = tongueVertexIndices[i];
            const orig = tongueOrigPositions[i];
            posAttr.setX(vi, orig.x);
            posAttr.setY(vi, orig.y);
            posAttr.setZ(vi, orig.z);
        }
    }
    
    posAttr.needsUpdate = true;
}

// ============================================================
// MAIN - parallel loading for speed
// ============================================================
async function main() {
    try {
        updateLoadProgress(5, '加载 Three.js...');
        
        // Load Three.js first (required for everything else)
        await loadScript('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js');
        THREE = window.THREE;
        updateLoadProgress(15, '初始化 3D 引擎...');
        
        initThree();
        
        // Load apple model + MediaPipe dependencies in parallel
        const mediaPromise = Promise.all([
            loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js'),
            loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js'),
        ]);
        
        // Load apple binary model (no OBJ loader needed!)
        await loadAppleBinary();
        
        // Start animation loop immediately (shows apple while MediaPipe loads)
        animate();
        
        // Wait for MediaPipe scripts
        await mediaPromise;
        
        // Initialize hand tracking
        await initMediaPipe();
        
    } catch (err) {
        console.error('Init error:', err);
        setStatus('初始化失败: ' + err.message);
        // Still try to hide loading so user sees something
        hideLoading();
    }
}

main();
</script>
</body>
</html>
