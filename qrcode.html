<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 苹果互动 - 扫码体验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d0f0f 30%, #0f1a2d 70%, #0a0a1a 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 24px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .emoji-header {
            font-size: 72px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-12px) rotate(-5deg); }
            75% { transform: translateY(-6px) rotate(5deg); }
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .qr-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        #qrcode canvas {
            border-radius: 12px;
        }
        .url-display {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            word-break: break-all;
        }
        .instructions {
            text-align: left;
            padding: 0 8px;
        }
        .instructions h3 {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 12px;
        }
        .step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }
        .step-num {
            flex-shrink: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        .step-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            line-height: 1.5;
            padding-top: 3px;
        }
        .btn-try {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 36px;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn-try:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.4);
        }
        .footer {
            margin-top: 32px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .note {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 12px;
            color: rgba(255, 193, 7, 0.9);
            font-size: 13px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji-header">🍎</div>
        <h1>AR 苹果互动体验</h1>
        <p class="subtitle">用手机摄像头检测你的手<br>苹果会飞过来舔你的手！</p>

        <div class="qr-card">
            <div id="qrcode"></div>
            <div class="url-display" id="url-display">加载中...</div>
        </div>

        <div class="instructions">
            <h3>📱 使用说明</h3>
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">使用手机扫描上方二维码</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">允许浏览器访问摄像头</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">伸出你的手，苹果会自动检测并飞向你的手掌 🖐️</div>
            </div>
            <div class="step">
                <div class="step-num">4</div>
                <div class="step-text">当苹果到达你手旁时，它会开心地舔你的手！👅</div>
            </div>
        </div>

        <div class="note">
            ⚠️ 确保在光线充足的环境下使用，以获得最佳的手部检测效果。推荐使用 Chrome 浏览器。
        </div>

        <a class="btn-try" href="index.html">在本设备上直接体验 →</a>

        <div class="footer">
            Powered by Google MediaPipe & Three.js
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // Determine the current URL for the AR page
        const currentUrl = window.location.href;
        const arUrl = currentUrl.replace('qrcode.html', 'index.html');
        
        // Display URL
        document.getElementById('url-display').textContent = arUrl;

        // Generate QR code
        new QRCode(document.getElementById('qrcode'), {
            text: arUrl,
            width: 220,
            height: 220,
            colorDark: '#ffffff',
            colorLight: 'transparent',
            correctLevel: QRCode.CorrectLevel.H,
        });
    </script>
</body>
</html>
